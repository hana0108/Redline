<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión | Redline Selection</title>
  <link rel="stylesheet" href="login-style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-left">
        <div class="login-left-inner">
          <span class="brand-name">REDLINE <span>SELECTION</span></span>
          <div class="login-tagline">
            <h2>Bienvenido de nuevo.</h2>
            <p>Panel administrativo de inventario exclusivo.</p>
          </div>
        </div>
      </div>

      <div class="login-right">
        <div class="login-form-wrap">
          <h1>Iniciar sesión</h1>
          <p class="login-subtitle">Introduce tus credenciales</p>

          <form id="loginForm">
            <div class="field-group">
              <label for="email">CORREO ELECTRÓNICO</label>
              <input type="email" id="email" placeholder="ejemplo@redline.com" autocomplete="email" required />
            </div>

            <div class="field-group">
              <label for="password">CONTRASEÑA</label>
              <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
            </div>

            <div class="login-options">
              <label class="remember-label">
                <input type="checkbox" id="remember" />
                <span>Recordarme</span>
              </label>
              <a href="#" class="forgot-link">¿Olvidaste la contraseña?</a>
            </div>

            <button type="submit" class="btn-login">ENTRAR</button>
            <div id="loginStatus" class="login-status"></div>
          </form>

          <div class="login-footer">
            <p>¿No tienes acceso? <a href="#">Contactar soporte</a></p>
            <a href="../index.html" class="back-link">← Volver al inicio</a>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="../api.js"></script>
  <script src="login.js"></script>
</body>
</html>
